    *{margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background-color:#000;}
    canvas{border: 0px none; outline: none; background-color: black;}
	.load{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
    .play-container{
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 2;
        background: #ff99ff;
        color: #4B0082;
        font-family: Arial, sans-serif;
        font-weight: bold;
        padding: 14px 22px;
        border-radius: 14px;
        border: 2px solid #ff66cc;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: transform 0.2s ease;
        cursor: pointer;
        display: none;
    }
    .play-container:hover{transform: scale(1.05);}
    #logOverlay {
        position: fixed;
        top: 0;
        left: 0;
        background: transparent;
        color: #fff;
        font-weight: bold;
        font-family: monospace;
        max-width: 50vw;
        white-space: pre-wrap;
        word-break: break-word;
        padding: 10px;
        pointer-events: none;
        z-index: 2;
        text-shadow:-1px -1px 0 black,1px -1px 0 black,-1px 1px 0 black,1px 1px 0 black;
    }
    center {
        color:#ffddff;
        font-size: 2em;
        text-shadow:-2px -2px 0 #ff66cc,2px -2px 0 #ff66cc,-2px 2px 0 #ff66cc,2px 2px 0 #ff66cc;
    }

<body>
    <div id="logOverlay"></div>
    <div class="play-container" id="playContainer" onclick="document.getElementById('playContainer').style.display='none'"><center>UNMUTE</center><br><img src="audio.png" style="width:160px;height:auto;" /></div>
    <img class="load" id="load" src="load.jpg"/>
    <canvas id="canvas" onclick="this.focus();document.getElementById('playContainer').style.display='none'" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
    <script type='text/javascript'>
        var Module = {canvas: document.getElementById('canvas')};
        const logOverlay = document.getElementById('logOverlay');
        const lines = [];
        function addChat(text){
            lines.push(text);
            if(lines.length > 9){lines.shift();}
            renderLines();
        }
        function renderLines(){
            const isMobile = window.innerWidth <= 768;
            if(isMobile){
                logOverlay.innerHTML = lines[lines.length - 1] || "";
            }else{
                logOverlay.innerHTML = lines.join("\n");
            }
        }
    </script>
